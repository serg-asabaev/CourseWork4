{% extends 'messagesender/base.html' %}

{% block title %}Создание получателя{% endblock %}

{% block content %}

<h1> Создание получателя сообщения </h1>

<div class="row text-center" style="grid-template-columns: 1fr 1fr 1fr;">
    <form class="row" method="post" enctype="multipart/form-data">
        <div class="card col-5">
            <div class="card-body">
                {% csrf_token %}
                {{ form.as_p }}
            </div>
            <button class="btn btn-primary">
                {% if recipient %}
                Сохранить
                {% else %}
                Создать
                {% endif %}
            </button>
        </div>
    </form>
</div>

{% endblock %}
